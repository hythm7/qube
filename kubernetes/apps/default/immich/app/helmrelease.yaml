---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: immich
      automountServiceAccountToken: false
      enableServiceLinks: false

    controllers:
      immich:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: immich-initdb-secret

        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.3
            env:
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: &pguser immich-pguser-secret
                    key: user
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: password
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: db
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: port
            envFrom: &envFrom
              - secretRef:
                  name: immich-secret
              - configMapRef:
                  name: immich-configmap
            resources: &resources
              claims:
                - name: gpu
              requests: &requests
                cpu: 100m
                memory: 250Mi
              limits:
                memory: 4Gi

      #machine-learning:
      #  annotations:
      #    reloader.stakater.com/auto: "true"
      #  containers:
      #    app:
      #      image:
      #        repository: ghcr.io/immich-app/immich-machine-learning
      #        tag: v2.7.3
      #      envFrom: *envFrom
      #      resources:
      #        requests: *requests
      #        limits:
      #          memory: 8Gi

    rawResources:
      gpu:
        apiVersion: resource.k8s.io/v1
        kind: ResourceClaimTemplate
        spec:
          spec:
            spec:
              devices:
                requests:
                  - name: gpu
                    exactly:
                      deviceClassName: gpu.amd.com

    service:
      immich:
        controller: immich
        ports:
          http:
            port: &port 2283
      #machine-learning:
      #  controller: machine-learning
      #  ports:
      #    http:
      #      port: 3003

    route:
      app:
        hostnames:
          - photos.hythm.net
          - "{{ .Release.Name }}.hythm.net"
        annotations:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://{{ .Release.Name }}.hythm.net
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        enabled: true
        type: nfs
        server: chthon.hythm.net
        path: /data/@apps/immich
        globalMounts:
          - path: /usr/src/app/upload
