---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app paperless
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: paperless-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Paperless
        PAPERLESS_SECRET_KEY: "{{ .PAPERLESS_SECRET_KEY }}"
        #PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
        #PAPERLESS_SOCIALACCOUNT_PROVIDERS: |
        #  {"openid_connect":{"APPS":[{"provider_id":"authelia","name":"Authelia","client_id":"{{ .PAPERLESS_OAUTH_CLIENT_ID }}","secret":"{{ .PAPERLESS_OAUTH_CLIENT_SECRET }}","settings":{"server_url":"https://auth.hythm.net/.well-known/openid-configuration"}}]}}
  dataFrom:
    - extract:
        key: paperless
    #- extract:
    #    key: authelia
