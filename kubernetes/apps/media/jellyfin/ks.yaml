---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app jellyfin
  namespace: &namespace media
spec:
  components:
    - ../../../../components/keda
    - ../../../../components/volsync
  dependsOn:
    - name: k8s-gpu-dra-driver
      namespace: kube-system
    - name: openebs
      namespace: openebs-system
  interval: 1h
  path: ./kubernetes/apps/meda/jellyfin/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 50Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
