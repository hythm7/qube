---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wizarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 15m
  values:
    controllers:
      wizarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/wizarrrr/wizarr
              tag: v2026.4.0@sha256:19da537e01b5470cb34b083b5ac64cb534dd27084d9d66bc634e96c1f3976884
            env:
              TZ: America/New_York
              PORT: &port 80
              PUID: &uid 1000
              PGID: &gid 1000
            resources:
              requests:
                cpu: 15m
              limits:
                memory: 512Mi
    #        securityContext:
    #          allowPrivilegeEscalation: false
    #          readOnlyRootFilesystem: true
    #          capabilities: { drop: ["ALL"] }
    #defaultPodOptions:
    #  securityContext:
    #    runAsNonRoot: true
    #    runAsUser: 1000
    #    runAsGroup: 1000
    #    fsGroup: 1000
    #    fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data/database
      tmpfs:
        type: emptyDir
        advancedMounts:
          wizarr:
            app:
              - path: /.cache
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://{{ .Release.Name }}.hythm.net/health
        hostnames:
          - "{{ .Release.Name }}.hythm.net"
          - join.hythm.net
        parentRefs:
          - name: envoy-external
            namespace: networking
    service:
      app:
        ports:
          http:
            port: *port
