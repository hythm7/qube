---
apiVersion: v1
kind: Service
metadata:
  name: postgres17
  annotations:
    external-dns.alpha.kubernetes.io/hostname: postgres.hythm.net
    lbipam.cilium.io/ips: 192.168.20.17
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: postgres17
    cnpg.io/instanceRole: primary
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
