---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets

---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-credentials-secret
  namespace: external-secrets
stringData:
  1password-credentials.json: 'op://kubernetes/1password/OP_CREDENTIALS_JSON' # quote

---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-vault-secret
  namespace: external-secrets
stringData:
  token: op://kubernetes/1password/OP_CONNECT_TOKEN

---
apiVersion: v1
kind: Secret
metadata:
  name: github-app-auth
  namespace: flux-system
type: Opaque
data:
  githubAppID:             op://kubernetes/flux/FLUX_GITHUB_APP_ID
  githubAppInstallationID: op://kubernetes/flux/FLUX_GITHUB_APP_INSTALLATION_ID
  githubAppPrivateKey:     op://kubernetes/flux/FLUX_GITHUB_APP_PRIVATE_KEY
